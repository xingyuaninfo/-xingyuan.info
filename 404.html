<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>页面维护中 - 星远科技</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0b0e1a;
            color: #fff;
            font-family: -apple-system, sans-serif;
            padding: 20px;
            text-align: center;
        }
        h1 { font-size: 72px; color: #f7a600; margin-bottom: 10px; }
        .desc { font-size: 18px; opacity: 0.9; margin-bottom: 30px; }
        .qr-box { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .qr-box img { width: 220px; height: 220px; display: block; }
        .address {
            background: #171b2f;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            word-break: break-all;
            max-width: 450px;
            margin-bottom: 20px;
            border: 1px solid rgba(247, 166, 0, 0.3);
            color: #f7a600;
        }
        .btn-home {
            display: inline-block;
            padding: 12px 30px;
            background: #21b2a6;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        .footer-note { font-size: 12px; opacity: 0.4; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>您的访问被限制</h1>
    <p class="desc">需打赏方可唤醒权限</p>

    <div class="qr-box">
        <img src="usdt.jpg" alt="USDT QR Code">
    </div>

    <div class="address">
        以此地址激活页面访问权限：<br>
        TUGU6Q5VJpuBtwse4Yuj7CExRTNYCsKszx
    </div>

    <a href="index.html" class="btn-home">不打赏，返回首页</a>

    <p class="footer-note">请在转账前核对地址完整性</p>
</body>
</html>
